name: Supabase Keep Alive

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually from GitHub if needed

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase URL
        run: |
          # We just request the project URL. 
          # This counts as "Network Traffic" to your project.
          curl -I ${{ secrets.SUPABASE_URL }}